<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>22. Sortable Table</title>
  <style>
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
    th { background: #3498db; color: white; cursor: pointer; }
    input { width: 100%; padding: 10px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <h1>Talabalar ro‘yxati</h1>
  <input type="text" id="search" placeholder="Qidirish..." onkeyup="filterTable()">
  
  <table id="table">
    <thead>
      <tr>
        <th onclick="sortTable(0)">Ism</th>
        <th onclick="sortTable(1)">Yosh</th>
        <th onclick="sortTable(2)">Bahosi</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    let data = [
      ["Ali", 20, 85], ["Vali", 22, 92], ["Sardor", 19, 78],
      ["Laylo", 21, 95], ["Aziz", 23, 88], ["Dilnoza", 20, 91]
    ];

    function renderTable(filteredData) {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      filteredData.forEach(row => {
        const tr = document.createElement('tr');
        row.forEach(cell => {
          const td = document.createElement('td');
          td.textContent = cell;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function sortTable(col) {
      data.sort((a, b) => a[col] > b[col] ? 1 : -1);
      renderTable(data);
    }

    function filterTable() {
      const term = document.getElementById('search').value.toLowerCase();
      const filtered = data.filter(row => 
        row.some(cell => String(cell).toLowerCase().includes(term))
      );
      renderTable(filtered);
    }

    renderTable(data);
  </script>
</body>
</html>
